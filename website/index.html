<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ハッピーメモリー</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Opti:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
    <div id="app">
        <h1 id="title">ハッピーメモリー</h1>
        <section id="view-first-settings" class="view">
            <h2>初期設定</h2>
            <p>ログイン</p>
            <button onclick="login()">ログイン</button>
        </section>

        <section id="view-record" class="view" style="display:none;">
            <h2>記録</h2>
            <textarea id="memory-input" placeholder="ハッピーな内容"></textarea>
            <button onclick="commitMemory()">コミット</button>
            <p id="sended"></p>
        </section>

        <section id="view-list" class="view" style="display:none;">
            <h2>ハッピーリスト</h2>
            <button class="happy-list" id="list" onclick="renderListList()">リスト</button>
            <button class="happy-list" id="random" onclick="renderListRandom()">ランダム</button>
            <div id="list-container">
                <ul id="memory-list"></ul>
            </div>
        </section>
        <section id="view-settings" class="view" style="display:none;">
            <h2>設定</h2>
            <button id="logout" onclick="logout()">ログアウト</button>
        </section>

        <nav id="bottom-nav" style="display:none;">
            <button onclick="showView('record')"><span class="material-symbols-outlined">add_notes</span>記録</button>
            <button onclick="showView('list')"><span class="material-symbols-outlined">list</span>閲覧</button>
            <button onclick="showView('settings')"><span class="material-symbols-outlined">settings</span>設定</button>
        </nav>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
